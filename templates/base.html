<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>SilverConnect - {% block title %}Home{% endblock %}</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='14' r='12' fill='%23d4880f'/><path d='M10 14Q16 6 22 14Q16 22 10 14Z' fill='white' opacity='0.4'/></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
      colors: {
        primary: { 50: '#fef3e2', 100: '#fde4bc', 200: '#fccf8c', 300: '#fbb95c', 400: '#faa32c', 500: '#d4880f', 600: '#a96c0c', 700: '#7e5009', 800: '#543506', 900: '#291a03' }
      }
    }
  }
}
</script>
</head>
<body>
{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
