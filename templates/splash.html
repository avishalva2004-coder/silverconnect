{% extends "base.html" %}
{% block title %}{{ _('Welcome') }}{% endblock %}
{% block content %}
<div class="min-h-screen flex flex-col" style="background: linear-gradient(135deg, #fef3e2 0%, #fff 50%, #f7f8fa 100%);">
  <div class="flex-1 flex flex-col justify-center px-6 max-w-md mx-auto w-full">
    <div class="text-center mb-12 splash-hero" style="opacity:0;transform:translateY(-20px)">
      <div class="w-28 h-28 bg-gradient-to-br from-primary-400 to-primary-600 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-primary-500/30">
        <i class="fas fa-hand-holding-heart text-6xl text-white"></i>
      </div>
      <h1 class="serif text-5xl text-primary-500 mb-2">SilverConnect</h1>
      <p class="text-lg text-slate-500">{{ _('Together in Golden Years') }}</p>
    </div>

    <div class="space-y-4">
      <a href="{{ url_for('login_page') }}" class="btn-primary w-full text-xl py-5 flex items-center justify-center gap-3 shadow-xl shadow-primary-500/25 splash-btn-primary" style="opacity:0;transform:scale(0.9)">
        <i class="fas fa-arrow-right-to-bracket"></i> {{ _('Sign In') }}
      </a>
      <a href="{{ url_for('signup_page') }}" class="w-full py-5 rounded-full text-lg font-semibold flex items-center justify-center gap-3 border-2 border-primary-300 text-primary-600 hover:bg-primary-50 transition-all active:scale-95 splash-btn-secondary" style="opacity:0;transform:translateY(20px)">
        <i class="fas fa-user-plus"></i> {{ _('Create Account') }}
      </a>
    </div>

    <p class="text-center text-xs text-slate-400 mt-12">{{ _('Built with care for our golden generation') }}</p>
  </div>
</div>

<script>
gsap.to('.splash-hero', {duration: 0.6, y: 0, opacity: 1, ease: 'power3.out'});
gsap.to('.splash-btn-primary', {duration: 0.6, scale: 1, opacity: 1, ease: 'back.out(1.7)', delay: 0.3});
gsap.to('.splash-btn-secondary', {duration: 0.5, y: 0, opacity: 1, delay: 0.5, ease: 'power3.out'});
</script>
{% endblock %}
